<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เลือกฟังก์ชั่นการใช้งาน - Accessory Copy Tool</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap');
  
/* ===== ตั้งค่าเริ่มต้นหน้าเว็บ ===== */
* {
  box-sizing: border-box;
}

body {
  font-family: 'Sarabun', Arial, sans-serif;
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #0d0d11 !important;
  overflow: hidden;
  font-size: 16px;
}

/* ===== วิดีโอพื้นหลังและแผ่นฟิล์มซ้อน ===== */
#bg-video {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

.video-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  z-index: -1;
}

/* ===== แถบด้านบน (Top Bar) ===== */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 70px;
  background: linear-gradient(90deg, rgba(217, 0, 0, 0.3), rgba(255, 45, 45, 0.2));
  border-bottom: 1px solid rgba(255, 255, 255, 0.15);
  display: flex;
  align-items: center;
  padding: 0 20px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  z-index: 999;
}

/* ปุ่ม Hamburger Icon */
.hamburger-btn {
  background: none;
  border: none;
  color: #fff;
  font-size: 26px;
  cursor: pointer;
  margin-right: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 5px;
  transition: transform 0.2s ease;
}

.hamburger-btn:hover {
  transform: scale(1.1);
}

.topbar img {
  width: 120px;
  height: 50px;
  object-fit: contain;
  margin-right: 15px;
  filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.3));
}

.topbar h1 {
  color: #fff;
  margin: 0;
  font-size: 24px;
  font-weight: bold;
  text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

.topbar span {
  color: rgba(255, 233, 233, 0.9);
  font-size: 14px;
  display: block;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}

/* ===== Hamburger Menu (Nav Drawer) ===== */
.scrim {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  z-index: 9998;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.scrim.active {
  opacity: 1;
  pointer-events: auto;
}

.nav-drawer {
  position: fixed;
  top: 0;
  left: -300px;
  width: 280px;
  height: 100vh;
  background: rgba(20, 20, 28, 0.85);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  border-right: 1px solid rgba(255, 255, 255, 0.15);
  box-shadow: 10px 0 30px rgba(0,0,0,0.5);
  z-index: 9999;
  transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  padding: 20px 0;
}

.nav-drawer.open {
  left: 0;
}

.drawer-header {
  padding: 0 20px 20px 20px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  color: #fff;
  font-size: 18px;
  font-weight: bold;
}

.drawer-menu {
  list-style: none;
  padding: 15px 0;
  margin: 0;
  flex: 1;
}

.drawer-menu li a {
  display: flex;
  align-items: center;
  padding: 14px 25px;
  color: rgba(255, 255, 255, 0.85);
  text-decoration: none;
  font-size: 16px;
  transition: all 0.2s ease;
}

.drawer-menu li a:hover {
  background: rgba(255, 255, 255, 0.1);
  color: #fff;
  padding-left: 30px;
}

/* ===== ปุ่มออกจากระบบ ด้านขวาบน ===== */
.btn-logout {
  padding: 8px 16px;
  background-color: #e53e3e;
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 6px;
  font-family: 'Sarabun', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 10px rgba(229, 62, 62, 0.3);
  position: fixed;
  top: 16px;
  right: 20px;
  z-index: 1000;
}

.btn-logout:hover {
  background-color: #c53030;
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(229, 62, 62, 0.5);
}

.btn-logout:active {
  transform: translateY(0px);
}

/* ===== ส่วนควบคุมเนื้อหาหลัก ===== */
.container {
  margin-top: 70px;
  height: calc(100vh - 70px);
  width: 100%;
  max-width: 1000px;
  margin-left: auto;
  margin-right: auto;
  display: flex;
  flex-direction: row; 
  align-items: center; 
  justify-content: center; 
  padding: 20px;
  gap: 35px; 
  position: relative;
  z-index: 1;
}

/* ===== คอลัมน์เมนูกระจกใส ===== */
.column-menu {
  flex: 1;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  padding: 40px 30px;
  border: 2px solid rgba(255, 255, 255, 0.15);
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.08) !important;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
  text-align: center;
  transition: all 0.3s ease;
}

.column-menu:hover {
  transform: translateY(-8px);
  box-shadow: 0 20px 45px rgba(0, 0, 0, 0.6);
  border-color: rgba(255, 255, 255, 0.3);
}

h2 {
  font-family: 'Sarabun', Arial, sans-serif;
  font-size: 24px;
  margin-top: 0;
  margin-bottom: 15px;
  color: #ffffff;
  font-weight: 600;
  text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

.menu-desc {
  font-size: 15px;
  color: rgba(255, 255, 255, 0.85);
  margin-bottom: 30px;
  line-height: 1.6;
  height: 48px; 
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}

.menu-btn {
  padding: 14px 20px;
  background: #3b82f6 !important;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Sarabun', Arial, sans-serif;
  font-size: 16px;
  font-weight: 600;
  color: #ffffff !important;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
}

.column-menu:hover .menu-btn {
  background: #3b82f6 !important;
}

.menu-btn:hover {
  background: #2563eb !important;
  color: #fff !important;
  box-shadow: 0 6px 20px rgba(37, 99, 235, 0.6);
  transform: scale(1.03);
}

.menu-btn:active {
  transform: scale(1);
}
</style>
</head>
<body>

    <!-- ปุ่ม Logout -->
    <button id="logoutBtn" class="btn-logout">ออกจากระบบ</button>

    <!-- วิดีโอพื้นหลัง -->
    <video id="bg-video" autoplay muted playsinline></video>
    <div class="video-overlay"></div>

    <!-- Scrim (แผ่นเงาสีดำเมื่อเปิด Nav Drawer) -->
    <div id="scrim" class="scrim"></div>

    <!-- Nav Drawer (Side Menu) -->
    <nav id="navDrawer" class="nav-drawer" aria-expanded="false">
        <div class="drawer-header">เมนูหลัก</div>
        <ul class="drawer-menu">
            <li><a href="main.html">🚗 อุปกรณ์ตกแต่ง</a></li>
            <li><a href="maintenance.html">🔧 อะไหล่เช็กระยะ</a></li>
            <li><a href="#">📋 รายงาน / ประวัติ</a></li>
            <li><a href="#">⚙️ ตั้งค่าระบบ</a></li>
        </ul>
    </nav>

    <!-- Topbar -->
    <div class="topbar">
        <!-- ปุ่มไอคอน Hamburger -->
        <button id="hamburgerBtn" class="hamburger-btn" aria-label="Toggle menu">☰</button>
        
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQGTnPqfhHyFNfp_04YV8a0w1bqfrAM4jJRw3NIh0O7ag&s=10" alt="Logo">
        <div>
            <h1>รายการอุปกรณ์รถ MG</h1>
            <span>Accessory Copy Tool</span>
        </div>
    </div>

    <!-- ส่วนเนื้อหาหลัก -->
    <div class="container">

        <!-- Card 1 -->
        <div class="column-menu">
            <h2>🚗 อุปกรณ์ตกแต่ง</h2>
            <div class="menu-desc">ระบบคัดลอกรายการอุปกรณ์ตกแต่งรถยนต์ และงานพื้นฐานทั่วไป</div>
            <button class="menu-btn" onclick="location.href='main.html'">เปิดใช้งานฟังก์ชั่น</button>
        </div>

        <!-- Card 2 -->
        <div class="column-menu">
            <h2>🔧 อะไหล่เช็กระยะ</h2>
            <div class="menu-desc">ระบบคัดลอกรายการของเหลว และบำรุงรักษาตามรอบระยะทาง</div>
            <button class="menu-btn" onclick="location.href='maintenance.html'">เปิดใช้งานฟังก์ชั่น</button>
        </div>

    </div>

<script>
// ===== JavaScript สำหรับ Hamburger Menu (Nav Drawer) =====
const hamburgerBtn = document.getElementById('hamburgerBtn');
const navDrawer = document.getElementById('navDrawer');
const scrim = document.getElementById('scrim');

function toggleDrawer() {
    const isOpen = navDrawer.classList.contains('open');
    if (isOpen) {
        navDrawer.classList.remove('open');
        scrim.classList.remove('active');
        navDrawer.setAttribute('aria-expanded', 'false');
    } else {
        navDrawer.classList.add('open');
        scrim.classList.add('active');
        navDrawer.setAttribute('aria-expanded', 'true');
    }
}

hamburgerBtn.addEventListener('click', toggleDrawer);
scrim.addEventListener('click', toggleDrawer);

// ===== JavaScript ควบคุมวิดีโอพื้นหลัง =====
const videoSources = [
  "https://mg-upload.sgp1.cdn.digitaloceanspaces.com/14a0f413e3b14d25aa5ab0367db0cc5b.mp4",
  "https://mg-upload.sgp1.cdn.digitaloceanspaces.com/f9c82dbc18f0b22b4170de8ce12b1ebf.mp4",
  "https://www.mgcars.com/static/car-banner/mgcyberster/hero-banner.mp4"
];

let currentVideoIndex = 0;
const videoPlayer = document.getElementById("bg-video");

function playNextVideo() {
  if (!videoPlayer || videoSources.length === 0) return;
  
  videoPlayer.src = videoSources[currentVideoIndex];
  videoPlayer.load();
  
  videoPlayer.play().catch(err => {
    console.log("วิดีโอโหลดไม่สำเร็จ กำลังข้ามไปตัวถัดไป...", err);
    setTimeout(playNextVideo, 1000); 
  });
  
  currentVideoIndex = (currentVideoIndex + 1) % videoSources.length;
}

if (videoPlayer) {
  videoPlayer.addEventListener("ended", playNextVideo);
  videoPlayer.addEventListener("error", playNextVideo);
}

window.addEventListener("DOMContentLoaded", playNextVideo);

// สั่งการเมื่อกดปุ่ม Log out
document.getElementById('logoutBtn').addEventListener('click', function() {
    window.location.href = 'index.html';
});
</script>

</body>
</html>
