<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เลือกฟังก์ชั่นการใช้งาน - Accessory Copy Tool</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap');
  
/* ===== ตั้งค่าเริ่มต้นหน้าเว็บให้เต็มจอพอดี ไม่หลุดขอบ ===== */
* {
  box-sizing: border-box;
}

body {
  font-family: 'Sarabun', Arial, sans-serif;
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #0d0d11 !important;
  overflow: hidden;
  font-size: 16px;
}

/* ===== วิดีโอพื้นหลังและแผ่นฟิล์มซ้อน (Layer -2 และ -1) ===== */
#bg-video {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

.video-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45); /* ปรับฟิล์มดำให้เข้มขึ้นเล็กน้อยเพื่อให้มิติกล่องกระจกใสลอยเด่น */
  z-index: -1;
}

/* ===== แถบด้านบน (Top Bar) ปรับใหม่ให้โปร่งใสสไตล์กระจกหรูหรา ===== */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 70px;
  background: linear-gradient(90deg, rgba(217, 0, 0, 0.3), rgba(255, 45, 45, 0.2)); /* ใช้สีแดงโปร่งแสง */
  border-bottom: 1px solid rgba(255, 255, 255, 0.15);
  display: flex;
  align-items: center;
  padding: 0 20px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px); /* รองรับเบราว์เซอร์ Safari */
  z-index: 9999;
}

.topbar img {
  width: 120px;
  height: 50px;
  object-fit: contain;
  margin-right: 15px;
  filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.3)); /* เพิ่มมิติให้โลโก้เด่นขึ้น */
}

.topbar h1 {
  color: #fff;
  margin: 0;
  font-size: 24px;
  font-weight: bold;
  text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

.topbar span {
  color: rgba(255, 233, 233, 0.9);
  font-size: 14px;
  display: block;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}

/* ===== ปุ่มกลับหน้าหลัก/ออกจากระบบ ด้านขวาบน ===== */
.btn-logout {
  padding: 8px 16px;
  background-color: #e53e3e;
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 6px;
  font-family: 'Sarabun', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 10px rgba(229, 62, 62, 0.3);
  
  position: fixed;
  top: 16px;
  right: 20px;
  z-index: 99999;
}

.btn-logout:hover {
  background-color: #c53030;
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(229, 62, 62, 0.5);
}

.btn-logout:active {
  transform: translateY(0px);
}

/* ===== ส่วนควบคุมเนื้อหาหลัก จัดกึ่งกลางหน้าจอ ===== */
.container {
  margin-top: 70px;
  height: calc(100vh - 70px);
  width: 100%;
  max-width: 1000px;
  margin-left: auto;
  margin-right: auto;
  display: flex;
  flex-direction: row; 
  align-items: center; 
  justify-content: center; 
  padding: 20px;
  gap: 35px; 
  position: relative;
  z-index: 1;
}

/* ===== คอลัมน์เมนูกระจกใส ปรับความชัดเจนของข้อความใหม่ ===== */
.column-menu {
  flex: 1;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  padding: 40px 30px;
  border: 2px solid rgba(255, 255, 255, 0.15);
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.08) !important; /* ปรับให้ใสขึ้นรับกับฉากหน้าแรก */
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
  text-align: center;
  transition: all 0.3s ease;
}

.column-menu:hover {
  transform: translateY(-8px);
  box-shadow: 0 20px 45px rgba(0, 0, 0, 0.6);
  border-color: rgba(255, 255, 255, 0.3);
}

/* ===== ปรับสีข้อความด้านในให้อ่านง่ายตัดกับวิดีโอมืด ===== */
h2 {
  font-family: 'Sarabun', Arial, sans-serif;
  font-size: 24px;
  margin-top: 0;
  margin-bottom: 15px;
  color: #ffffff;
  font-weight: 600;
  text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

.menu-desc {
  font-size: 15px;
  color: rgba(255, 255, 255, 0.85);
  margin-bottom: 30px;
  line-height: 1.6;
  height: 48px; 
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}

/* ===== ปุ่มฟังก์ชั่นสไตล์โมเดิร์นเข้าคู่กัน ===== */
.menu-btn {
  padding: 14px 20px;
  background: #3b82f6 !important; /* เปลี่ยนเป็นโทนสีฟ้าเรืองแสงตามธีมหลัก */
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Sarabun', Arial, sans-serif;
  font-size: 16px;
  font-weight: 600;
  color: #ffffff !important;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
}

/* ยกเลิก css hover ตัวเก่าที่เปลี่ยนสีพื้นหลังกล่อง */
.column-menu:hover .menu-btn {
  background: #3b82f6 !important;
}

.menu-btn:hover {
  background: #2563eb !important;
  color: #fff !important;
  box-shadow: 0 6px 20px rgba(37, 99, 235, 0.6);
  transform: scale(1.03);
}

.menu-btn:active {
  transform: scale(1);
}
</style>

</head>
<body>

    <!-- ปุ่มออกจากระบบกลับไปหน้า Login -->
    <button id="logoutBtn" class="btn-logout">ออกจากระบบ</button>

    <!-- วิดีโอพื้นหลังเล่นต่อเนื่องแบบสุ่ม/วนลูป เหมือนหน้าหลัก -->
    <video id="bg-video" autoplay muted playsinline></video>
    <div class="video-overlay"></div>

    <!-- แถบเมนูด้านบนสไตล์กระจกใสสีแดงแบรนด์ ABLE -->
    <div class="topbar">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQGTnPqfhHyFNfp_04YV8a0w1bqfrAM4jJRw3NIh0O7ag&s=10">
        <div>
            <h1>รายการอุปกรณ์รถ MG</h1>
            <span>Accessory Copy Tool</span>
        </div>
    </div>

    <!-- กล่องเลือกฟังก์ชั่นจัดเรียงจากซ้ายไปขวาอย่างเป็นระเบียบ -->
    <div class="container">

        <!-- ฟังก์ชั่นที่ 1 (ฝั่งซ้าย) -->
        <div class="column-menu">
            <h2>🚗 อุปกรณ์ตกแต่ง</h2>
            <div class="menu-desc">ระบบคัดลอกรายการอุปกรณ์ตกแต่งรถยนต์ และงานพื้นฐานทั่วไป</div>
            <button class="menu-btn" onclick="location.href='main.html'">เปิดใช้งานฟังก์ชั่น</button>
        </div>

        <!-- ฟังก์ชั่นที่ 2 (ฝั่งขวา) -->
        <div class="column-menu">
            <h2>🔧 อะไหล่เช็กระยะ</h2>
            <div class="menu-desc">ระบบคัดลอกรายการของเหลว และบำรุงรักษาตามรอบระยะทาง</div>
            <button class="menu-btn" onclick="location.href='maintenance.html'">เปิดใช้งานฟังก์ชั่น</button>
        </div>

    </div>

<!-- JavaScript สำหรับควบคุมวิดีโอพื้นหลังและปุ่ม Log out เหมือนเดิมร้อยเปอร์เซ็นต์ -->
<script>
const videoSources = [
  "https://mg-upload.sgp1.cdn.digitaloceanspaces.com/14a0f413e3b14d25aa5ab0367db0cc5b.mp4",
  "https://mg-upload.sgp1.cdn.digitaloceanspaces.com/f9c82dbc18f0b22b4170de8ce12b1ebf.mp4",
  "https://www.mgcars.com/static/car-banner/mgcyberster/hero-banner.mp4"
];

let currentVideoIndex = 0;
const videoPlayer = document.getElementById("bg-video");

function playNextVideo() {
  if (!videoPlayer || videoSources.length === 0) return;
  
  videoPlayer.src = videoSources[currentVideoIndex];
  videoPlayer.load();
  
  videoPlayer.play().catch(err => {
    console.log("วิดีโอโหลดไม่สำเร็จ กำลังข้ามไปตัวถัดไป...", err);
    setTimeout(playNextVideo, 1000); 
  });
  
  currentVideoIndex = (currentVideoIndex + 1) % videoSources.length;
}

if (videoPlayer) {
  videoPlayer.addEventListener("ended", playNextVideo);
  videoPlayer.addEventListener("error", playNextVideo);
}

window.addEventListener("DOMContentLoaded", playNextVideo);

// สั่งการเมื่อมีการกดปุ่มออกจากระบบ
document.getElementById('logoutBtn').addEventListener('click', function() {
    window.location.href = 'index.html';
});
</script>

</body>
</html>
