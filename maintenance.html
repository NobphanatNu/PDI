<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายการอะไหล่เช็กระยะ MG - Accessory Copy Tool</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap');
  
* { box-sizing: border-box; }

body {
  font-family: 'Sarabun', Arial, sans-serif;
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #0d0d11 !important;
  overflow: hidden;
  font-size: 16px;
  color: #fff;
}

#bg-video {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

.video-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  z-index: -1;
}

.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 70px;
  background: rgba(140, 20, 20, 0.4);
  border-bottom: 1px solid rgba(255, 255, 255, 0.15);
  display: flex;
  align-items: center;
  padding: 0 20px;
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  z-index: 999;
}

.hamburger-btn {
  background: none; border: none; color: #fff; font-size: 26px;
  cursor: pointer; margin-right: 15px; display: flex; align-items: center;
}

.topbar img { width: 100px; height: 40px; object-fit: contain; margin-right: 15px; }
.topbar h1 { margin: 0; font-size: 20px; font-weight: bold; }
.topbar span { color: rgba(255, 233, 233, 0.8); font-size: 12px; display: block; }

.btn-logout {
  padding: 8px 16px; background-color: #e53e3e; color: white;
  border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 6px;
  font-family: 'Sarabun', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; position: fixed; top: 16px; right: 20px; z-index: 1000;
}

.scrim {
  position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6);
  z-index: 9998; opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.scrim.active { opacity: 1; pointer-events: auto; }

.nav-drawer {
  position: fixed; top: 0; left: -300px; width: 280px; height: 100vh;
  background: rgba(20, 20, 28, 0.9); backdrop-filter: blur(25px);
  border-right: 1px solid rgba(255, 255, 255, 0.15); z-index: 9999;
  transition: left 0.3s ease; display: flex; flex-direction: column; padding: 20px 0;
}
.nav-drawer.open { left: 0; }
.drawer-header { padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: bold; }
.drawer-menu { list-style: none; padding: 15px 0; margin: 0; }
.drawer-menu li a { display: block; padding: 14px 25px; color: #fff; text-decoration: none; }
.drawer-menu li a:hover { background: rgba(255, 255, 255, 0.1); }

.container {
  margin-top: 70px; height: calc(100vh - 70px);
  width: 100%; max-width: 1200px; margin-left: auto; margin-right: auto;
  padding: 20px; display: flex; flex-direction: column; gap: 20px;
}

.selector-card {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 16px; padding: 20px;
  backdrop-filter: blur(20px);
  display: flex; gap: 20px; align-items: center; flex-wrap: wrap;
}

.select-group { flex: 1; min-width: 250px; }
.select-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 15px; }

select {
  width: 100%; padding: 12px 16px;
  background: rgba(30, 32, 45, 0.9);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 8px; color: #fff; font-family: 'Sarabun', sans-serif;
  font-size: 15px; outline: none; cursor: pointer;
}
select:focus { border-color: #e53e3e; }

.result-card {
  flex: 1; background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 16px; padding: 20px;
  backdrop-filter: blur(20px); overflow-y: auto;
}

.empty-state { text-align: center; color: rgba(255,255,255,0.5); padding: 50px 0; }

.item-list { display: flex; flex-direction: column; gap: 10px; }
.item-row {
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(255, 255, 255, 0.85); color: #1a1a1a;
  padding: 12px 18px; border-radius: 8px; cursor: pointer;
  transition: all 0.2s ease;
}
.item-row:hover { background: #fff; transform: translateX(4px); }
.item-row.active { background: #3b82f6; color: #fff; }
.part-no { font-size: 13px; color: #666; font-family: monospace; }
.item-row.active .part-no { color: rgba(255,255,255,0.8); }
</style>
</head>
<body>

    <button id="logoutBtn" class="btn-logout">ออกจากระบบ</button>
    <video id="bg-video" autoplay muted playsinline></video>
    <div class="video-overlay"></div>

    <div id="scrim" class="scrim"></div>

    <nav id="navDrawer" class="nav-drawer">
        <div class="drawer-header">เมนูการใช้งาน</div>
        <ul class="drawer-menu">
            <li><a href="menu.html">🏠 กลับหน้าเลือกฟังก์ชั่น</a></li>
            <li><a href="main.html">🚗 อุปกรณ์ตกแต่ง</a></li>
            <li><a href="maintenance.html">🔧 อะไหล่เช็กระยะ</a></li>
        </ul>
    </nav>

    <div class="topbar">
        <button id="hamburgerBtn" class="hamburger-btn">☰</button>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQGTnPqfhHyFNfp_04YV8a0w1bqfrAM4jJRw3NIh0O7ag&s=10" alt="Logo">
        <div>
            <h1>รายการอะไหล่เช็กระยะ MG</h1>
            <span>Accessory Copy Tool</span>
        </div>
    </div>

    <div class="container">
        <div class="selector-card">
            <div class="select-group">
                <label for="carModelSelect">🚗 เลือกรุ่นรถ:</label>
                <select id="carModelSelect">
                    <option value="">-- กำลังโหลดข้อมูลตาราง... --</option>
                </select>
            </div>

            <div class="select-group">
                <label for="mileageSelect">⏱️ รอบเช็กระยะ:</label>
                <select id="mileageSelect" disabled>
                    <option value="">-- กรุณาเลือกรุ่นรถก่อน --</option>
                </select>
            </div>
        </div>

        <div class="result-card">
            <div id="displayArea" class="empty-state">
                กรุณาเลือกรุ่นรถและรอบระยะทาง เพื่อดูรายการอะไหล่
            </div>
        </div>
    </div>

<script>
// ===== ใส่ Link ไฟล์ตาราง CSV หรือ Google Sheet (Export CSV) ตรงนี้ =====
const DATA_SOURCE_URL = 'maintenance_data.csv'; 

let parsedDatabase = {}; 

// ===== ฟังก์ชั่นดึงและประมวลผลข้อมูลจากตาราง CSV =====
async function loadTableData() {
    try {
        const response = await fetch(DATA_SOURCE_URL);
        const rawText = await textCleaner(await response.text());
        parseCSVToDataStructure(rawText);
        populateModelDropdown();
    } catch (err) {
        console.error("ไม่สามารถโหลดไฟล์ตารางได้:", err);
        // หากโหลดไฟล์ไม่สำเร็จ ใช้ระบบสำรองในการดึงรายการรุ่นรถ
        displayArea.innerHTML = '<div class="empty-state">เกิดข้อผิดพลาดในการโหลดไฟล์ตารางข้อมูล กรุณาตรวจสอบไฟล์ maintenance_data.csv</div>';
    }
}

// ทำความสะอาดข้อความ ป้องกันการสับสนของวรรคหรือคอลัมน์
function textCleaner(str) {
    return str.replace(/\r/g, '');
}

// แปรรูปข้อมูล CSV เป็นโครงสร้าง { "ชื่อรุ่นรถ": { "รอบระยะ": [ รายการอะไหล่ ] } }
function parseCSVToDataStructure(csvText) {
    const lines = csvText.split('\n');
    let currentModel = "";
    let currentMileage = "";

    lines.forEach(line => {
        if (!line.trim()) return;

        // แยกคอลัมน์ด้วยเครื่องหมาย comma
        const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g, ''));

        // ดึงเฉพาะแถวที่เป็นการระบุ "รุ่นรถ" (กรองคำขยะออก)
        if (cols[0] && (cols[0].includes("MG") || cols[0].includes("รุ่น")) && !cols[0].includes("ตารางแสดง") && !cols[0].includes("Part no")) {
            currentModel = cols[0].replace("ตารางเช็กระยะ", "").replace("Periodical Maintenance Table", "").trim();
            if (!parsedDatabase[currentModel]) {
                parsedDatabase[currentModel] = {};
            }
        } 
        // ตรวจจับรอบระยะทาง (เช่น 10,000 km, 20,000 km, 6 เดือน ฯลฯ)
        else if (cols[0] && (cols[0].includes("กม.") || cols[0].includes("Km") || cols[0].includes("เดือน"))) {
            currentMileage = cols[0];
            if (currentModel && !parsedDatabase[currentModel][currentMileage]) {
                parsedDatabase[currentModel][currentMileage] = [];
            }
        }
        // ตรวจจับรายการอะไหล่และรหัสสินค้า
        else if (cols.length >= 2 && cols[0] && currentModel) {
            const partNo = cols[0];
            const partName = cols[1];
            const price = cols[2] || "-";

            // กรองคำหัวตารางออก
            if (partNo !== "เบอร์อะไหล่" && partNo !== "Part no." && partName) {
                // ถ้าระบุระยะไว้ ให้ลงกลุ่มระยะนั้น ถ้าไม่ได้ระบุ ให้ลงกลุ่มระยะล่าสุด
                const targetMileage = currentMileage || "รายการทั่วไป / ทุกระยะ";
                if (!parsedDatabase[currentModel][targetMileage]) {
                    parsedDatabase[currentModel][targetMileage] = [];
                }

                parsedDatabase[currentModel][targetMileage].push({
                    partNo: partNo,
                    name: partName,
                    price: price
                });
            }
        }
    });
}

// ===== เติมรายชื่อรุ่นรถที่คัดกรองแล้วลง Dropdown =====
const carModelSelect = document.getElementById('carModelSelect');
const mileageSelect = document.getElementById('mileageSelect');
const displayArea = document.getElementById('displayArea');

function populateModelDropdown() {
    const models = Object.keys(parsedDatabase);

    if (models.length === 0) {
        carModelSelect.innerHTML = '<option value="">-- ไม่พบรายชื่อรุ่นรถในตาราง --</option>';
        return;
    }

    carModelSelect.innerHTML = '<option value="">-- เลือกรุ่นรถ --</option>';
    models.forEach(model => {
        const opt = document.createElement('option');
        opt.value = model;
        opt.textContent = model;
        carModelSelect.appendChild(opt);
    });
}

// เมื่อเปลี่ยนรุ่นรถ -> อัปเดตรอบระยะ
carModelSelect.addEventListener('change', function() {
    const selectedModel = this.value;
    mileageSelect.innerHTML = '';

    if (!selectedModel || !parsedDatabase[selectedModel]) {
        mileageSelect.innerHTML = '<option value="">-- กรุณาเลือกรุ่นรถก่อน --</option>';
        mileageSelect.disabled = true;
        displayArea.innerHTML = '<div class="empty-state">กรุณาเลือกรุ่นรถและรอบระยะทาง เพื่อดูรายการอะไหล่</div>';
        return;
    }

    const mileages = Object.keys(parsedDatabase[selectedModel]);
    mileageSelect.disabled = false;
    mileageSelect.innerHTML = '<option value="">-- เลือกรอบเช็กระยะ --</option>';

    mileages.forEach(mileage => {
        const opt = document.createElement('option');
        opt.value = mileage;
        opt.textContent = mileage;
        mileageSelect.appendChild(opt);
    });
});

// เมื่อเปลี่ยนรอบระยะ -> แสดงตารางอะไหล่
mileageSelect.addEventListener('change', function() {
    const model = carModelSelect.value;
    const mileage = this.value;

    if (!model || !mileage) return;

    const items = parsedDatabase[model]?.[mileage];

    if (items && items.length > 0) {
        let html = '<div class="item-list">';
        items.forEach(item => {
            html += `
                <div class="item-row" onclick="copyText('${item.partNo} ${item.name}', this)">
                    <div>
                        <div style="font-weight:600;">${item.name}</div>
                        <div class="part-no">Part No: ${item.partNo}</div>
                    </div>
                    <div style="font-weight:bold; color:#e53e3e;">${item.price} ${item.price !== '-' ? '฿' : ''}</div>
                </div>
            `;
        });
        html += '</div>';
        displayArea.innerHTML = html;
    } else {
        displayArea.innerHTML = `<div class="empty-state">ไม่พบรายการอะไหล่ในระยะนี้</div>`;
    }
});

// ฟังก์ชั่นกด Copy
let lastActiveRow = null;
function copyText(text, element) {
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text);
    } else {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
    }

    if (lastActiveRow) lastActiveRow.classList.remove('active');
    element.classList.add('active');
    lastActiveRow = element;
}

// Nav Drawer
const hamburgerBtn = document.getElementById('hamburgerBtn');
const navDrawer = document.getElementById('navDrawer');
const scrim = document.getElementById('scrim');

function toggleDrawer() {
    navDrawer.classList.toggle('open');
    scrim.classList.toggle('active');
}
hamburgerBtn.addEventListener('click', toggleDrawer);
scrim.addEventListener('click', toggleDrawer);

document.getElementById('logoutBtn').addEventListener('click', () => window.location.href = 'index.html');

// เริ่มอ่านข้อมูลตารางทันทีเมื่อเปิดหน้า
window.addEventListener('DOMContentLoaded', loadTableData);
</script>
</body>
</html>
