<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมคำนวณค่าเช็กระยะ MG</title>
    <style>
        body { font-family: 'Sarabun', Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #d32f2f; margin-bottom: 25px; font-size: 24px; }
        .form-group { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .form-control { flex: 1; min-width: 200px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        .card { background: #fafafa; border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 14px; }
        th { background-color: #f1f1f1; }
        .text-center { text-align: center; }
        .text-right { text-align: right; }
        .total-box { background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 8px; padding: 15px; margin-top: 15px; }
        .total-row { display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 8px; }
        .total-row.grand { font-size: 18px; font-weight: bold; color: #2e7d32; border-top: 1px solid #a5d6a7; padding-top: 8px; }
        .copy-btn { width: 100%; background: #1976d2; color: #fff; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s; margin-top: 15px; }
        .copy-btn:hover { background: #115293; }
        textarea { width: 100%; height: 120px; margin-top: 10px; border-radius: 6px; border: 1px solid #ccc; padding: 10px; font-family: monospace; font-size: 13px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚘 ตารางคำนวณและสรุปค่าบริการเช็กระยะ MG</h1>
    
    <div class="form-group">
        <div class="form-control">
            <label for="carModel">เลือกรุ่นรถ:</label>
            <select id="carModel" onchange="calculateService()">
                <option value="NEW_MG_ZS">New MG ZS</option>
                <option value="MG_ZS_EV">MG ZS EV</option>
                <option value="NEW_MG_ZS_EV">New MG ZS EV</option>
            </select>
        </div>
        <div class="form-control">
            <label for="serviceKm">เลือกรอบเช็กระยะ (กม.):</label>
            <select id="serviceKm" onchange="calculateService()"></select>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-top:0;">🛠️ รายการอะไหล่และของเหลวที่ต้องเปลี่ยน</h3>
        <table id="partsTable">
            <thead>
                <tr>
                    <th>เบอร์อะไหล่</th>
                    <th>รายการอะไหล่</th>
                    <th class="text-center">จำนวน</th>
                    <th class="text-right">ราคา/หน่วย</th>
                    <th class="text-right">ราคารวม</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <div class="total-box">
            <div class="total-row"><span>รวมค่าอะไหล่:</span><span id="partsTotal">0.00 บาท</span></div>
            <div class="total-row"><span>ค่าแรงบริการ:</span><span id="labourTotal">0.00 บาท</span></div>
            <div class="total-row"><span>ภาษีมูลค่าเพิ่ม (VAT 7%):</span><span id="vatTotal">0.00 บาท</span></div>
            <div class="total-row grand"><span>รวมสุทธิทั้งสิ้น:</span><span id="grandTotal">0.00 บาท</span></div>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-top:0;">📋 ข้อความสำหรับคัดลอก (Copy Text)</h3>
        <textarea id="copyText" readonly></textarea>
        <button class="copy-btn" onclick="copyToClipboard()">📋 คัดลอกข้อความสรุป</button>
    </div>
</div>

<script>
// ข้อมูลฐานระบบตามตาราง
const masterData = {
    parts: {
        "10134155": { name: "น้ำมันเครื่องสังเคราะห์ 5W30 A5/B5 (4L)", unit: 1, price: 1495 },
        "11486328": { name: "ไส้กรองน้ำมันเครื่อง", unit: 1, price: 240 },
        "ALU1403": { name: "แหวนรองน็อตถ่ายน้ำมันเครื่อง", unit: 1, price: 12 },
        "G00000362": { name: "ไส้กรองอากาศ", unit: 1, price: 355 },
        "G00000266": { name: "ไส้กรองแอร์พรีเมี่ยม PM 2.5", unit: 1, price: 590 },
        "G00000356": { name: "ไส้กรองแอร์พรีเมี่ยม PM 2.5 (EV)", unit: 1, price: 590 },
        "10189906": { name: "น้ำยาหม้อน้ำ 4 ลิตร", unit: 1, price: 790 },
        "10196876": { name: "น้ำยาหม้อน้ำ 1 ลิตร", unit: 1, price: 195 },
        "G00000459": { name: "น้ำมันเบรก 1 ลิตร", unit: 1, price: 498 },
        "10137065": { name: "น้ำมันเกียร์อัตโนมัติ 1 ลิตร (ZS EV)", unit: 2, price: 1175 },
        "10925167": { name: "น้ำมันเกียร์อัตโนมัติ 1 ลิตร (New ZS EV)", unit: 1, price: 1500 },
        "10004211": { name: "แหวนรองเติมน้ำมันเกียร์", unit: 1, price: 3 },
        "10064941": { name: "แหวนถ่ายน้ำมันเกียร์", unit: 1, price: 9 },
        "10471721": { name: "น้ำมันเกียร์อัตโนมัติ CVT 1 ลิตร", unit: 4, price: 425 },
        "10407695": { name: "แหวนรองเติมน้ำมันเกียร์ CVT", unit: 1, price: 7 },
        "10811222": { name: "แหวนถ่ายน้ำมันเกียร์ CVT", unit: 1, price: 9 },
        "10501598": { name: "ปลั๊กถ่ายน้ำมันเกียร์", unit: 1, price: 16 },
        "10406912": { name: "ไส้กรองน้ำมันเกียร์", unit: 1, price: 350 },
        "10406973": { name: "ไส้กรองเครื่องกรองแรงดันต่ำเกียร์", unit: 1, price: 170 },
        "10412354": { name: "โอริ่งไส้กรองเครื่องกรองแรงดันเกียร์", unit: 1, price: 9 },
        "11446616": { name: "หัวเทียน", unit: 4, price: 165 },
        "10137854": { name: "ไส้กรองน้ำมันเชื้อเพลิง", unit: 1, price: 235 },
        "10202623": { name: "สายพานขับหน้าเครื่อง", unit: 1, price: 410 }
    },
    schedules: {
        "NEW_MG_ZS": {
            labourFreeKm: [10000, 20000, 30000, 40000, 50000],
            labourRatePerHour: 750,
            labourHours: { 10000:1.5, 20000:1.5, 30000:2.2, 40000:2.4, 50000:1.5, 60000:3.0, 70000:1.5, 80000:3.3, 90000:2.2, 100000:2.5, 110000:1.5, 120000:4.5, 130000:1.5, 140000:1.5, 150000:2.2, 160000:3.3, 170000:1.5, 180000:3.0, 190000:1.5, 200000:3.4, 210000:2.2, 220000:1.5, 230000:1.5, 240000:5.4, 250000:1.5, 260000:1.5, 270000:2.2, 280000:2.4, 290000:1.5, 300000:4.0 },
            getParts: (km) => {
                let list = ["10134155", "11486328", "ALU1403"];
                if ([30000, 60000, 90000, 120000, 150000, 180000, 210000, 240000, 270000, 300000].includes(km)) list.push("G00000362");
                if ([40000, 80000, 120000, 160000, 200000, 240000, 280000].includes(km)) list.push("G00000266");
                if ([100000, 200000, 300000].includes(km)) list.push("10189906", "10196876");
                if ([60000, 120000, 180000, 240000, 300000].includes(km)) list.push("G00000459");
                if ([80000, 160000, 240000].includes(km)) list.push("10471721", "10407695", "10811222", "10501598", "10406912", "10406973", "10412354");
                if ([30000, 60000, 90000, 120000, 150000, 180000, 210000, 240000, 270000, 300000].includes(km)) list.push("11446616");
                if ([40000, 80000, 120000, 160000, 200000, 240000, 280000].includes(km)) list.push("10137854");
                if ([120000, 240000].includes(km)) list.push("10202623");
                return list;
            }
        },
        "MG_ZS_EV": {
            labourFreeKm: [10000, 20000, 30000, 40000, 50000],
            labourRatePerHour: 750,
            labourHours: { 10000:0.5, 20000:0.5, 30000:0.5, 40000:1.0, 50000:0.5, 60000:0.5, 70000:0.5, 80000:1.8, 90000:0.5, 100000:0.5, 110000:0.5, 120000:1.0, 130000:0.5, 140000:0.5, 150000:0.5, 160000:1.8, 170000:0.5, 180000:0.5, 190000:0.5, 200000:1.0, 210000:0.5, 220000:0.5, 230000:0.5, 240000:1.8, 250000:0.5, 260000:0.5, 270000:0.5, 280000:1.0, 290000:0.5, 300000:0.5 },
            getParts: (km) => {
                let list = [];
                if ([40000, 80000, 120000, 160000, 200000, 240000, 280000].includes(km)) list.push("G00000266", "G00000459");
                if ([80000, 160000, 240000].includes(km)) list.push("10189906", "10196876", "10137065", "10004211", "10064941");
                return list;
            }
        },
        "NEW_MG_ZS_EV": {
            labourFreeKm: [10000, 20000, 30000, 40000, 50000],
            labourRatePerHour: 750,
            labourHours: { 10000:0.5, 20000:0.5, 30000:0.5, 40000:1.0, 50000:0.5, 60000:0.5, 70000:0.5, 80000:1.8, 90000:0.5, 100000:0.5, 110000:0.5, 120000:1.0, 130000:0.5, 140000:0.5, 150000:0.5, 160000:1.8, 170000:0.5, 180000:0.5, 190000:0.5, 200000:1.0, 210000:0.5, 220000:0.5, 230000:0.5, 240000:1.8, 250000:0.5, 260000:0.5, 270000:0.5, 280000:1.0, 290000:0.5, 300000:0.5 },
            getParts: (km) => {
                let list = [];
                if ([40000, 80000, 120000, 160000, 200000, 240000, 280000].includes(km)) list.push("G00000356", "G00000459");
                if ([80000, 160000, 240000].includes(km)) list.push("10189906", "10196876", "10925167", "10004211", "10064941");
                return list;
            }
        }
    }
};

// เติมตัวเลือกระยะทาง 10,000 - 300,000 กม.
const kmSelect = document.getElementById('serviceKm');
for (let km = 10000; km <= 300000; km += 10000) {
    let opt = document.createElement('option');
    opt.value = km;
    opt.textContent = `${km.toLocaleString()} กม. (${km/10000 * 6} เดือน)`;
    kmSelect.appendChild(opt);
}

function calculateService() {
    const modelKey = document.getElementById('carModel').value;
    const km = parseInt(document.getElementById('serviceKm').value);
    const modelData = masterData.schedules[modelKey];
    
    const partKeys = modelData.getParts(km);
    const tbody = document.querySelector('#partsTable tbody');
    tbody.innerHTML = '';
    
    let partsTotal = 0;
    let summaryTextParts = [];

    if (partKeys.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center" style="color:#777;">ไม่มีรายการเปลี่ยนอะไหล่ในรอบนี้ (ตรวจเช็กตามระยะฟรี/ปกติ)</td></tr>`;
    } else {
        partKeys.forEach((key, idx) => {
            const item = masterData.parts[key];
            const itemTotal = item.price * item.unit;
            partsTotal += itemTotal;

            tbody.innerHTML += `
                <tr>
                    <td>${key}</td>
                    <td>${item.name}</td>
                    <td class="text-center">${item.unit}</td>
                    <td class="text-right">${item.price.toLocaleString('.2f')}</td>
                    <td class="text-right">${itemTotal.toLocaleString('.2f')}</td>
                </tr>
            `;
            summaryTextParts.push(`${idx + 1}. ${item.name} x${item.unit} = ${itemTotal.toLocaleString()} บาท`);
        });
    }

    // คำนวณค่าแรง
    const hours = modelData.labourHours[km] || 0;
    const isFree = modelData.labourFreeKm.includes(km);
    const labourCost = isFree ? 0 : (hours * modelData.labourRatePerHour);

    // ภาษีและราคารวม
    const subtotal = partsTotal + labourCost;
    const vat = subtotal * 0.07;
    const grandTotal = subtotal + vat;

    // แสดงผล
    document.getElementById('partsTotal').innerText = `${partsTotal.toFixed(2)} บาท`;
    document.getElementById('labourTotal').innerText = isFree ? `ฟรี (${hours} ชม.)` : `${labourCost.toFixed(2)} บาท (${hours} ชม.)`;
    document.getElementById('vatTotal').innerText = `${vat.toFixed(2)} บาท`;
    document.getElementById('grandTotal').innerText = `${grandTotal.toFixed(2)} บาท`;

    // สร้างข้อความ Text สรุปสำหรับคัดลอก
    const modelName = document.getElementById('carModel').options[document.getElementById('carModel').selectedIndex].text;
    let copyStr = `รายการเช็กระยะ ${modelName} - ${km.toLocaleString()} กม. (${km/10000 * 6} เดือน)\n`;
    copyStr += `----------------------------------------\n`;
    if (summaryTextParts.length > 0) {
        copyStr += summaryTextParts.join('\n') + `\n`;
    } else {
        copyStr += `ไม่มีรายการเปลี่ยนอะไหล่ (ตรวจเช็กระยะอย่างเดียว)\n`;
    }
    copyStr += `----------------------------------------\n`;
    copyStr += `รวมค่าอะไหล่: ${partsTotal.toLocaleString('.2f')} บาท\n`;
    copyStr += `ค่าแรงบริการ: ${isFree ? 'ฟรี' : labourCost.toLocaleString('.2f') + ' บาท'}\n`;
    copyStr += `ภาษีมูลค่าเพิ่ม (7%): ${vat.toLocaleString('.2f')} บาท\n`;
    copyStr += `ยอดรวมสุทธิ: ${grandTotal.toLocaleString('.2f')} บาท`;

    document.getElementById('copyText').value = copyStr;
}

function copyToClipboard() {
    const copyText = document.getElementById("copyText");
    copyText.select();
    document.execCommand("copy");
    alert("คัดลอกข้อความสรุปเรียบร้อยแล้ว!");
}

// เรียกคำนวณครั้งแรก
calculateService();
</script>

</body>
</html>
