<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ระบบจัดการอุปกรณ์รถ</title>
    
    <!-- นำเข้าฟอนต์ Sarabun -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- ไอคอนสำหรับช่องกรอกข้อมูล (จากแบบแรกที่ต้องการ) -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <style>
        /* --- Reset & Base Styles --- */
        * {
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            overflow: hidden;
        }

        /* --- วิดีโอพื้นหลังแบบเต็มจอ --- */
        #video-background {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -100;
            object-fit: cover;
        }

        /* --- แผ่นสีดำโปร่งแสงช่วยให้เห็นตัวหนังสือชัดขึ้น --- */
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: -99;
        }

        /* --- ตัวจัดกึ่งกลางหน้าจอ --- */
        .login-page-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            position: relative;
            z-index: 1;
        }

        /* --- ปรับโฉมกล่อง Login ใหม่ (สไตล์กระจกใสเบลอระดับพรีเมียม) --- */
        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .login-header h2 {
            margin: 0 0 5px 0;
            color: #ffffff;
            font-size: 26px;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .login-header p {
            margin: 0 0 15px 0;
            color: rgba(255, 255, 255, 0.8);
            font-size: 15px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        /* --- ปรับรูปแบบโครงสร้าง Form Group ใหม่ให้มีเส้นขีดล่างตามตัวอย่างแรก --- */
        .form-group {
            position: relative;
            width: 100%;
            height: 50px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.7);
            margin: 35px 0;
            text-align: left;
        }

        /* จัดข้อความ Label ให้ลอยอยู่ตรงกลางช่องกรอกตอนแรก */
        .form-group label {
            position: absolute;
            top: 50%;
            left: 5px;
            transform: translateY(-50%);
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            pointer-events: none;
            transition: .4s ease;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        /* เมื่อคลิกหรือมีข้อมูลพิมพ์อยู่ จะดัน Label ขึ้นด้านบนและเปลี่ยนเป็นสีฟ้า */
        .form-group input:focus ~ label,
        .form-group input:valid ~ label {
            top: -8px;
            font-size: 13px;
            color: #3b82f6;
            font-weight: 600;
        }

        /* ช่องอินพุตตัดขอบและพื้นหลังทึบออก ให้เหลือแค่ความโล่งโปร่งแสง */
        .form-group input {
            width: 100%;
            height: 100%;
            background: transparent !important;
            border: none;
            outline: none;
            font-size: 16px;
            color: #ffffff !important;
            font-weight: 500;
            padding: 0 35px 0 5px;
            transition: all 0.3s ease;
            box-shadow: none !important;
        }

        /* จัดตำแหน่งไอคอนให้อยู่ด้านขวาของแต่ละช่อง */
        .form-group .icon {
            position: absolute;
            right: 8px;
            font-size: 20px;
            color: #ffffff;
            top: 50%;
            transform: translateY(-50%);
        }

        /* --- ปุ่มเข้าสู่ระบบโทนสีฟ้าเดิม แต่เพิ่ม Effect ให้ลอยตัวโมเดิร์นขึ้น --- */
        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-login:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.6);
        }

        .btn-login:active {
            transform: translateY(0px);
        }

        /* --- กล่องแจ้งเตือนเมื่อรหัสผิด --- */
        .error-msg {
            color: #e53e3e;
            font-size: 14px;
            margin-top: 20px;
            display: none;
            background: rgba(255, 245, 245, 0.9);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #fed7d7;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- เล่นวิดีโอพื้นหลังเดิมของคุณ -->
    <video autoplay loop muted playsinline id="video-background">
        <source id="video-source" src="" type="video/mp4">
        เบราว์เซอร์ของคุณไม่รองรับการเล่นวิดีโอพื้นหลัง
    </video>

    <div class="video-overlay"></div>

    <div class="login-page-wrapper">
        <div class="login-card">
            <div class="login-header">
                <h2>ระบบจัดการอุปกรณ์รถ</h2>
                <p>กรุณาเข้าสู่ระบบเพื่อดำเนินการต่อ</p>
            </div>

            <form id="mockLoginForm">
                <!-- เปลี่ยนดีไซน์ช่องกรอก Username เป็นรูปแบบอนิเมชันพร้อมไอคอนรูปคน -->
                <div class="form-group">
                    <input type="text" id="username" required autocomplete="off">
                    <label for="username">ชื่อผู้ใช้งาน</label>
                    <span class="icon"><ion-icon name="person"></ion-icon></span>
                </div>
                
                <!-- เปลี่ยนดีไซน์ช่องกรอก Password เป็นรูปแบบอนิเมชันพร้อมไอคอนแม่กุญแจ -->
                <div class="form-group">
                    <input type="password" id="password" required>
                    <label for="password">รหัสผ่าน</label>
                    <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                </div>

                <button type="submit" class="btn-login">เข้าสู่ระบบ</button>
                
                <div id="errorAlert" class="error-msg">ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง!</div>
            </form>
        </div>
    </div>

    <script>
        // --- 1. ระบบมัดรวม 3 วิดีโอและทำการสุ่มพื้นหลัง (คงระบบเดิมของคุณไว้) ---
        const videoUrls = [
            "https://mg-upload.sgp1.cdn.digitaloceanspaces.com/14a0f413e3b14d25aa5ab0367db0cc5b.mp4",
            "https://mg-upload.sgp1.cdn.digitaloceanspaces.com/f9c82dbc18f0b22b4170de8ce12b1ebf.mp4",
            "https://www.mgcars.com/static/car-banner/mgcyberster/hero-banner.mp4"
        ];

        const randomIndex = Math.floor(Math.random() * videoUrls.length);
        const selectedVideo = videoUrls[randomIndex] + "?t=" + new Date().getTime();

        const videoEl = document.getElementById('video-background');
        videoEl.src = selectedVideo;
        
        videoEl.load();
        videoEl.play().catch(function(error) {
            console.log("Autoplay ติดนโยบายเบราว์เซอร์ แต่ถูกจัดการแล้ว:", error);
        });

        // --- 2. ระบบเช็คสถานะการเข้าสู่ระบบ (คงระบบเดิมของคุณไว้) ---
        document.getElementById('mockLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const userVal = document.getElementById('username').value;
            const passVal = document.getElementById('password').value;
            const errorAlert = document.getElementById('errorAlert');

            if (userVal === "Admin" && passVal === "@Admin") {
                errorAlert.style.display = 'none';
                sessionStorage.setItem('isLoggedIn', 'true');
                window.location.href = "menu.html";
            } else {
                errorAlert.style.display = 'block';
                document.querySelector('.login-card').style.animation = "shake 0.3s";
                setTimeout(() => { document.querySelector('.login-card').style.animation = ""; }, 300);
            }
        });

        // เอฟเฟกต์กล่องสั่นเมื่อกรอกรหัสผิด (คงระบบเดิมของคุณไว้)
        const styleSheet = document.styleSheets[0];
        styleSheet.insertRule(`
            @keyframes shake {
                0% { transform: translateX(0); }
                25% { transform: translateX(-6px); }
                50% { transform: translateX(6px); }
                75% { transform: translateX(-6px); }
                100% { transform: translateX(0); }
            }
        `, styleSheet.cssRules.length);
    </script>

</body>
</html>
