<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ระบบจัดการอุปกรณ์รถ</title>
    
    <!-- นำเข้าฟอนต์ Sarabun ให้เหมือนหน้าเว็บเดิมของคุณ -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: #f4f6f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        .login-header h2 {
            margin: 0 0 10px 0;
            color: #1a202c;
            font-size: 24px;
            font-weight: 600;
        }

        .login-header p {
            margin: 0 0 30px 0;
            color: #718096;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.15);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: #2b6cb0;
        }

        .error-msg {
            color: #e53e3e;
            font-size: 14px;
            margin-top: 15px;
            display: none;
            background: #fff5f5;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #fed7d7;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <h2>ระบบจัดการอุปกรณ์รถ</h2>
        <p>กรุณาเข้าสู่ระบบเพื่อดำเนินการต่อ</p>
    </div>

    <form id="mockLoginForm">
        <div class="form-group">
            <label for="username">ชื่อผู้ใช้งาน</label>
            <input type="text" id="username" placeholder="ระบุ Username" required autocomplete="off">
        </div>
        
        <div class="form-group">
            <label for="password">รหัสผ่าน</label>
            <input type="password" id="password" placeholder="ระบุ Password" required>
        </div>

        <button type="submit" class="btn-login">เข้าสู่ระบบ</button>
        
        <!-- ข้อความแจ้งเตือนเมื่อรหัสผิด -->
        <div id="errorAlert" class="error-msg">ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง!</div>
    </form>
</div>

<script>
    document.getElementById('mockLoginForm').addEventListener('submit', function(e) {
        e.preventDefault(); // ป้องกันการรีเฟรชหน้าจอ
        
        const userVal = document.getElementById('username').value;
        const passVal = document.getElementById('password').value;
        const errorAlert = document.getElementById('errorAlert');

        // ตรวจสอบข้อมูลแบบจำลองตามที่กำหนด
        if (userVal === "Admin" && passVal === "@Admin") {
            errorAlert.style.display = 'none';
            // วิ่งไปที่หน้าเนื้อหาเดิมที่คุณเปลี่ยนชื่อเป็น main.html ไว้
            window.location.href = 'main.html';
        } else {
            // แสดงเตือนถ้ากรอกผิด
            errorAlert.style.display = 'block';
        }
    });
</script>

</body>
</html>
